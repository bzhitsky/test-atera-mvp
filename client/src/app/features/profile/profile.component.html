<div class="profile-card">

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header class="profile-header">
    <span class="header-spacer"></span>
    <h1 class="profile-title">Профиль</h1>
    <button class="close-btn" (click)="close()" aria-label="Закрыть">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </header>

  @if (user(); as u) {
    <div class="profile-body">

      @if (saveSuccess()) {
        <div class="success-banner" role="alert">Профиль успешно обновлён</div>
      }

      <!-- ── Fields ────────────────────────────────────────────────────── -->
      <div class="fields">

        <div class="field-group">
          <label class="field-label" for="f-name">ИМЯ</label>
          <input
            id="f-name"
            class="field-input"
            type="text"
            placeholder="Ваше имя"
            [(ngModel)]="editName"
            autocomplete="name"
          />
        </div>

        <div class="field-group">
          <label class="field-label" for="f-phone">НОМЕР ТЕЛЕФОНА</label>
          <input
            id="f-phone"
            class="field-input field-input--readonly"
            type="tel"
            [value]="u.phone"
            readonly
          />
        </div>

        <div class="field-group">
          <label class="field-label" for="f-email">EMAIL</label>
          <input
            id="f-email"
            class="field-input"
            type="email"
            placeholder="example@mail.ru"
            [(ngModel)]="editEmail"
            autocomplete="email"
          />
        </div>

        <div class="field-group">
          <label class="field-label" for="f-gender">ПОЛ</label>
          <select id="f-gender" class="field-input" [(ngModel)]="editGender">
            <option value="">Не указан</option>
            <option value="male">Мужской</option>
            <option value="female">Женский</option>
          </select>
        </div>

        <div class="field-group">
          <label class="field-label" for="f-birthday">ДЕНЬ РОЖДЕНИЯ</label>
          <input
            id="f-birthday"
            class="field-input"
            type="date"
            [(ngModel)]="editBirthday"
          />
        </div>

      </div>

      <!-- ── Consents ──────────────────────────────────────────────────── -->
      <div class="consents">
        <label class="consent-row">
          <input class="consent-check" type="checkbox" [(ngModel)]="agreeOffer" />
          <span class="consent-text">Согласен с офертой</span>
        </label>
        <label class="consent-row">
          <input class="consent-check" type="checkbox" [(ngModel)]="agreePrivacy" />
          <span class="consent-text">Согласен с
            <a class="consent-link" href="/privacy" target="_blank" (click)="$event.stopPropagation()">
              политикой конфиденциальности
            </a>
          </span>
        </label>
      </div>

      @if (saveError()) {
        <p class="error-text" role="alert">{{ saveError() }}</p>
      }

      <!-- ── Actions ───────────────────────────────────────────────────── -->
      <div class="form-actions">
        <button class="btn-delete" type="button" (click)="deleteProfile()">
          Удалить профиль
        </button>
        <button
          class="btn-save"
          type="button"
          (click)="save()"
          [disabled]="saving()"
        >
          {{ saving() ? 'Сохраняем…' : 'Сохранить' }}
        </button>
      </div>

    </div>
  }

</div>
