<div class="checkout-page">

  <!-- ── Header ──────────────────────────────────────────────────────────── -->
  <header class="checkout-header">
    <button class="back-btn" (click)="goBack()" aria-label="Назад">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <h1 class="checkout-title">Детали заказа</h1>
    <span class="header-spacer"></span>
  </header>

  <div class="checkout-content">

    <!-- ── Comment ───────────────────────────────────────────────────────── -->
    <textarea
      class="comment-input"
      placeholder="Комментарий ресторану"
      rows="3"
      [(ngModel)]="comment"
      maxlength="500"
    ></textarea>

    <!-- ── Time ──────────────────────────────────────────────────────────── -->
    <section class="section">
      <h2 class="section-title">Время выдачи</h2>
      <div class="time-tabs" role="radiogroup" aria-label="Время выдачи">
        <button
          class="time-tab"
          [class.time-tab--active]="timeMode() === 'asap'"
          (click)="setTimeMode('asap')"
          role="radio"
          [attr.aria-checked]="timeMode() === 'asap'"
        >Как можно скорее</button>
        <button
          class="time-tab"
          [class.time-tab--active]="timeMode() === 'scheduled' && selectedTime() === '11:00'"
          (click)="selectQuickTime('11:00')"
          role="radio"
          [attr.aria-checked]="timeMode() === 'scheduled' && selectedTime() === '11:00'"
        >11:00</button>
        <button
          class="time-tab"
          [class.time-tab--active]="showTimePicker() || (timeMode() === 'scheduled' && selectedTime() !== '11:00')"
          (click)="openTimePicker()"
          role="radio"
          [attr.aria-checked]="showTimePicker() || (timeMode() === 'scheduled' && selectedTime() !== '11:00')"
        >
          @if (timeMode() === 'scheduled' && selectedTime() !== '11:00' && !showTimePicker()) {
            {{ selectedTime() }}
          } @else {
            Другое
          }
        </button>
      </div>

      @if (showTimePicker()) {
        <div class="time-slots">
          @for (t of pickupTimes; track t) {
            <button
              class="time-slot"
              [class.time-slot--active]="selectedTime() === t"
              (click)="selectQuickTime(t)"
            >{{ t }}</button>
          }
        </div>
      }
    </section>

    <!-- ── Payment ───────────────────────────────────────────────────────── -->
    <section class="section">
      <h2 class="section-title">Способ оплаты</h2>
      <div class="payment-tabs" role="radiogroup" aria-label="Способ оплаты">

        <button
          class="payment-tab"
          [class.payment-tab--active]="paymentMethod() === 'SBP'"
          (click)="setPayment('SBP')"
          role="radio"
          [attr.aria-checked]="paymentMethod() === 'SBP'"
          aria-label="СБП"
        >
          <svg width="28" height="28" viewBox="0 0 40 40" fill="none" aria-hidden="true">
            <rect width="40" height="40" rx="8" fill="#1D1346"/>
            <path d="M10 20.5 L17 27.5 L30 12.5" stroke="#00B956" stroke-width="3.5"
                  stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M17 12.5 L24 12.5 L30 20.5 L24 27.5 L17 27.5 L10 20.5 Z"
                  fill="none" stroke="#00B956" stroke-width="2.5"/>
          </svg>
          <span>СБП</span>
        </button>

        <button
          class="payment-tab"
          [class.payment-tab--active]="paymentMethod() === 'Card'"
          (click)="setPayment('Card')"
          role="radio"
          [attr.aria-checked]="paymentMethod() === 'Card'"
          aria-label="Картой онлайн"
        >
          <svg width="28" height="28" viewBox="0 0 40 40" fill="none" aria-hidden="true">
            <rect width="40" height="40" rx="8" fill="#2563EB"/>
            <rect x="7" y="12" width="26" height="16" rx="3" fill="none" stroke="#fff" stroke-width="2"/>
            <rect x="7" y="17" width="26" height="4" fill="#fff" opacity="0.3"/>
            <rect x="11" y="22" width="8" height="2.5" rx="1" fill="#fff" opacity="0.8"/>
          </svg>
          <span>Картой онлайн</span>
        </button>

        <button
          class="payment-tab"
          [class.payment-tab--active]="paymentMethod() === 'CardCourier'"
          (click)="setPayment('CardCourier')"
          role="radio"
          [attr.aria-checked]="paymentMethod() === 'CardCourier'"
          aria-label="Картой курьеру"
        >
          <svg width="28" height="28" viewBox="0 0 40 40" fill="none" aria-hidden="true">
            <rect width="40" height="40" rx="8" fill="#6366F1"/>
            <rect x="7" y="12" width="26" height="16" rx="3" fill="none" stroke="#fff" stroke-width="2"/>
            <circle cx="14" cy="24" r="2.5" fill="#fff" opacity="0.8"/>
          </svg>
          <span>Картой курьеру</span>
        </button>

        <button
          class="payment-tab"
          [class.payment-tab--active]="paymentMethod() === 'Cash'"
          (click)="setPayment('Cash')"
          role="radio"
          [attr.aria-checked]="paymentMethod() === 'Cash'"
          aria-label="Наличными"
        >
          <svg width="28" height="28" viewBox="0 0 40 40" fill="none" aria-hidden="true">
            <rect width="40" height="40" rx="8" fill="#16A34A"/>
            <rect x="7" y="14" width="26" height="12" rx="2" fill="none" stroke="#fff" stroke-width="2"/>
            <circle cx="20" cy="20" r="3" stroke="#fff" stroke-width="1.5"/>
          </svg>
          <span>Наличными</span>
        </button>

      </div>
    </section>

    <!-- ── Order summary ─────────────────────────────────────────────────── -->
    <section class="section">
      <h2 class="section-title">Состав заказа</h2>
      <div class="summary-row">
        <span class="summary-label">Товары в заказе</span>
        <span class="summary-value">{{ total() | number:'1.0-0' }}&thinsp;₽</span>
      </div>
    </section>

  </div><!-- /checkout-content -->

  <!-- ── Footer / Submit ──────────────────────────────────────────────────── -->
  <footer class="checkout-footer">
    @if (submitError()) {
      <p class="submit-error" role="alert">{{ submitError() }}</p>
    }
    <button
      class="submit-btn"
      [disabled]="!canSubmit()"
      (click)="submit()"
    >
      @if (submitting()) {
        Оформляем…
      } @else {
        Оформить заказ
        <span class="submit-total">{{ total() | number:'1.0-0' }}&thinsp;₽</span>
      }
    </button>
  </footer>

</div>
